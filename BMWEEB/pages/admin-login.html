<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BISU-Calape Feedback System</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
    </button>
    
    <div class="login-container">
        <div class="login-right">
            <div class="login-form-container">
                <div class="login-branding">
                    <img src="../images/BISU.png" alt="BISU Logo" class="login-logo">
                </div>
                <div class="login-header">
                    <h2>Admin Login</h2>
                    <p>Enter your credentials to access the dashboard</p>
                </div>
                <form id="loginForm" data-validate data-type="login">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <div class="login-footer">
                    <p>Demo Credentials:</p>
                    <code>Username: admin | Password: admin123</code>
                    <a href="../index.html" class="back-link">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Check if already logged in
        if (sessionStorage.getItem('currentUser')) {
            window.location.href = 'admin-dashboard.html';
        }
        
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('passwordInput');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>

    <style>
        /* Keyframe Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            opacity: 1;
            animation: fadeIn 0.5s ease-out;
        }
        
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        
        .login-left {
            display: none;
        }
        
        .login-overlay {
            display: none;
        }
        
        .login-left-content {
            display: none;
        }
        
        .login-branding {
            margin-bottom: 40px;
            text-align: center;
            animation: scaleIn 0.6s ease-out 0.2s both;
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .login-logo:hover {
            transform: scale(1.1);
        }
        
        .login-branding h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-branding p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .login-features {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .login-feature {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
        }
        
        .login-feature i {
            font-size: 1.5rem;
            color: #d4a528;
        }
        
        .login-feature span {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .login-right {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-form-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .login-form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color var(--transition-base);
        }
        
        .back-link:hover {
            color: var(--primary-color);
        }
        
        .login-header {
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }
        
        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--gray-600);
        }
        
        .input-with-icon {
            position: relative;
        }
        
        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-500);
            transition: color 0.3s ease;
        }
        
        .input-with-icon .form-control {
            padding-left: 45px;
            padding-right: 45px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }
        
        .input-with-icon .form-control:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.15);
        }
        
        .input-with-icon:focus-within i {
            color: var(--primary-color);
        }
        
        .form-group {
            animation: fadeInUp 0.6s ease-out both;
        }
        
        .form-group:nth-child(1) {
            animation-delay: 0.2s;
        }
        
        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-500);
            font-size: 1rem;
            cursor: pointer;
            padding: 0;
            z-index: 10;
        }
        
        .password-toggle:hover {
            color: var(--gray-700);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--gray-700);
            cursor: pointer;
        }
        
        .checkbox-label input {
            accent-color: var(--primary-color);
        }
        
        .forgot-link {
            font-size: 0.9rem;
            color: var(--primary-color);
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .btn-block {
            width: 100%;
            animation: fadeInUp 0.6s ease-out 0.5s both;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }
        
        .btn-block:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 51, 102, 0.35);
        }
        
        .btn-block:active {
            transform: translateY(-1px);
        }
        
        .login-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
            text-align: center;
            animation: fadeIn 0.6s ease-out 0.6s both;
        }
        
        .login-footer p {
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-bottom: 10px;
        }
        
        .login-footer code {
            display: inline-block;
            padding: 10px 15px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            color: var(--gray-700);
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--gray-600);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--primary-color);
        }
        
        @media (max-width: 992px) {
            .login-container {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .login-form-container {
                padding: 30px 20px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</body>
</html>
